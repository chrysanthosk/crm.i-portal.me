services:
  crm-db:
    image: mysql:8.4
    container_name: crm-dev-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crm_dev_i_portal_me}
      MYSQL_USER: ${DB_USERNAME:-crm_dev_i_portal_me}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - crm_dev_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-dev-app
    restart: unless-stopped
    depends_on:
      crm-db:
        condition: service_healthy
    environment:
      APP_NAME: "CRM Dev"
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://crm-dev.i-portal.me
      DB_CONNECTION: mysql
      DB_HOST: crm-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crm_dev_i_portal_me}
      DB_USERNAME: ${DB_USERNAME:-crm_dev_i_portal_me}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
    ports:
      - "127.0.0.1:8088:8000"
    volumes:
      - ./.env.docker:/var/www/html/.env
      - crm_dev_storage:/var/www/html/storage

volumes:
  crm_dev_db_data:
  crm_dev_storage:
